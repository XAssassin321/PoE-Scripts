<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PoE Timeless Jewel Builder</title>

<style>
body { font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px;}
.container { display:grid; grid-template-columns:1fr 1fr; gap:20px;}
.card { background:#1e293b; padding:15px; border-radius:10px;}
input, textarea, button, select {
  width:100%; margin:5px 0; padding:8px; border-radius:6px; border:none;
}
button { background:#3b82f6; color:white; cursor:pointer;}
.delete { background:#ef4444;}
textarea { height:120px; background:#020617; color:#22c55e;}
.filter { border-bottom:1px solid #334155; margin-bottom:6px; padding-bottom:6px;}
</style>
</head>

<body>

<h2>PoE Timeless Jewel Builder (Simple)</h2>

<div class="container">

<!-- LEFT -->
<div class="card">

<h3>Jewel Type</h3>
<select id="jewelType">
  <optgroup label="Lethal Pride (Karui)">
    <option value="rakiata">Rakiata</option>
    <option value="kaom">Kaom</option>
    <option value="kiloava">Kiloava</option>
    <option value="akoya">Akoya</option>
  </optgroup>

  <optgroup label="Brutal Restraint (Maraketh)">
    <option value="asenath">Asenath</option>
    <option value="nasima">Nasima</option>
    <option value="balbala">Balbala</option>
  </optgroup>

  <optgroup label="Elegant Hubris (Eternal Empire)">
    <option value="cadiro">Cadiro</option>
    <option value="victario">Victario</option>
    <option value="caspiro">Caspiro</option>
  </optgroup>

  <optgroup label="Glorious Vanity (Vaal)">
    <option value="doryani">Doryani</option>
    <option value="xibaqua">Xibaqua</option>
    <option value="ahuatotli">Ahuana</option>
  </optgroup>

  <optgroup label="Militant Faith (Templar)">
    <option value="venarius">Venarius</option>
    <option value="dominus">Dominus</option>
    <option value="avarius">Avarius</option>
  </optgroup>
</select>

<h3>Bulk Seeds</h3>
<textarea id="bulk" placeholder="12096, 13000, 14000"></textarea>

<button onclick="addSeeds()">Add Seeds</button>
<button onclick="dedupe()">Remove Duplicates</button>

<h3>Filters</h3>
<div id="filters"></div>

</div>

<!-- RIGHT -->
<div class="card">

<h3>JSON</h3>
<textarea id="json"></textarea>

<h3>Raw URL</h3>
<textarea id="raw"></textarea>

<h3>Encoded URL</h3>
<textarea id="encoded"></textarea>

<button onclick="generate()">Generate URLs</button>

</div>

</div>

<script>

const BASE = "https://www.pathofexile.com/trade/search/Standard";

// default query
let query = {
  query:{
    status:{option:"online"},
    stats:[{
      type:"count",
      value:{min:1},
      filters:[{
        id:"explicit.pseudo_timeless_jewel_rakiata",
        value:{min:1,max:1},
        disabled:false
      }],
      disabled:false
    }]
  },
  sort:{price:"asc"}
};

function getFilters(){
  return query.query.stats[0].filters;
}

// parse numbers
function parse(str){
  return str.split(/[\s,]+/)
    .map(n=>+n)
    .filter(n=>!isNaN(n));
}

// add seeds using selected jewel type
function addSeeds(){
  const nums = parse(document.getElementById("bulk").value);
  const type = document.getElementById("jewelType").value;

  nums.forEach(n=>{
    if(!getFilters().some(f => f.id === buildId(type) && f.value.min === n)){
      getFilters().push({
        id: buildId(type),
        value:{min:n,max:n},
        disabled:false
      });
    }
  });

  refresh();
}

function buildId(type){
  return `explicit.pseudo_timeless_jewel_${type}`;
}

// dedupe (by id + seed)
function dedupe(){
  const seen=new Set();

  query.query.stats[0].filters =
    getFilters().filter(f=>{
      const key = f.id + "_" + f.value.min;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });

  refresh();
}

// delete
function removeFilter(i){
  getFilters().splice(i,1);
  refresh();
}

// generate URLs
function generate(){
  const raw = BASE + "?q=" + JSON.stringify(query);
  const enc = BASE + "?q=" + encodeURIComponent(JSON.stringify(query));

  document.getElementById("raw").value = raw;
  document.getElementById("encoded").value = enc;
}

// UI
function refresh(){
  const div = document.getElementById("filters");
  div.innerHTML="";

  getFilters().forEach((f,i)=>{
    const el=document.createElement("div");
    el.className="filter";

    el.innerHTML = `
      ${f.id.replace("explicit.pseudo_timeless_jewel_","")} : ${f.value.min}
      <button class="delete" onclick="removeFilter(${i})">Delete</button>
    `;

    div.appendChild(el);
  });

  document.getElementById("json").value =
    JSON.stringify(query,null,2);
}

refresh();

</script>

</body>
</html>
