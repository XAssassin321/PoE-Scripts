<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PoE Timeless Jewel Power Tool</title>

<style>
body { font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px;}
.container { display:grid; grid-template-columns:1fr 1fr; gap:20px;}
.card { background:#1e293b; padding:15px; border-radius:10px;}
input, textarea, button, select {
  width:100%; margin:5px 0; padding:8px; border-radius:6px; border:none;
}
button { background:#3b82f6; color:white; cursor:pointer;}
.delete { background:#ef4444;}
textarea { height:100px; background:#020617; color:#22c55e;}
.filter { border-bottom:1px solid #334155; margin-bottom:6px;}
</style>
</head>

<body>

<h2>PoE Timeless Jewel Power Tool</h2>

<div class="container">

<!-- LEFT -->
<div class="card">

<h3>Bulk Seeds</h3>
<textarea id="bulk"></textarea>

  <!--
<h4>Range Generator</h4>
<input id="rangeMin" placeholder="Min">
<input id="rangeMax" placeholder="Max">
<input id="step" placeholder="Step (optional)">
<button onclick="generateRange()">Generate Range</button>
-->
<h4>Jewel Type</h4>
<select id="jewelType">
  <option value="rakiata">Lethal Pride (Rakiata)</option>
  <option value="kaom">Lethal Pride (Kaom)</option>
  <option value="kiloava">Lethal Pride (Kiloava)</option>
  <option value="akoya">Lethal Pride (Akoya)</option>

  <option value="asenath">Brutal Restraint (Asenath)</option>
  <option value="nasima">Brutal Restraint (Nasima)</option>
  <option value="balbala">Brutal Restraint (Balbala)</option>

  <option value="cadiro">Elegant Hubris (Cadiro)</option>
  <option value="victario">Elegant Hubris (Victario)</option>
  <option value="caspiro">Elegant Hubris (Caspiro)</option>

  <option value="doryani">Glorious Vanity (Doryani)</option>
  <option value="xibaqua">Glorious Vanity (Xibaqua)</option>
  <option value="ahuatotli">Glorious Vanity (Ahuana/Xibaqua variants)</option>

  <option value="venarius">Militant Faith (Venarius)</option>
  <option value="dominus">Militant Faith (Dominus)</option>
  <option value="avarius">Militant Faith (Avarius)</option>
</select>

<label><input type="checkbox" id="disabled"> Disabled</label>

<button onclick="bulkAdd()">Add Seeds</button>

<hr>

<h3>Filters</h3>
<div id="filters"></div>

<button onclick="dedupe()">Remove Duplicates</button>
<button onclick="compress()">Compress Ranges</button>

<hr>

<h3>Stats Groups</h3>
<button onclick="addStat()">Add Group</button>
<button onclick="chunk()">Auto Chunk</button>

</div>

<!-- RIGHT -->
<div class="card">

<h3>Import URL</h3>
<textarea id="import"></textarea>
<button onclick="decodeUrl()">Decode</button>

<h3>JSON</h3>
<textarea id="json"></textarea>

<h3>Raw URL</h3>
<textarea id="raw"></textarea>

<h3>Encoded URL</h3>
<textarea id="encoded"></textarea>

<button onclick="generate()">Generate URLs</button>

</div>

</div>

<script>

const BASE = "https://www.pathofexile.com/trade/search/Standard";

let query = {
  query:{
    status:{option:"online"},
    stats:[{
      type:"count",
      value:{min:1},
      filters:[{
        id:"explicit.pseudo_timeless_jewel_rakiata",
        value:{min:12096,max:12096},
        disabled:false
      }],
      disabled:false
    }]
  },
  sort:{price:"asc"}
};

function getFilters(group=0){
  return query.query.stats[group].filters;
}

// ===== CRUD =====

function addFilter(num, disabled, type){
  const id = `explicit.pseudo_timeless_jewel_${type}`;
  if(getFilters().some(f=>f.id===id && f.value.min===num)) return;

  getFilters().push({
    id,
    value:{min:num,max:num},
    disabled
  });
}

function removeFilter(group,i){
  getFilters(group).splice(i,1);
  refresh();
}

// ===== BULK =====

function bulkAdd(){
  const nums = parseInput(document.getElementById("bulk").value);
  const disabled = document.getElementById("disabled").checked;
  const type = document.getElementById("jewelType").value;

  nums.forEach(n=>addFilter(n,disabled,type));
  refresh();
}

function generateRange(){
  let min = +rangeMin.value;
  let max = +rangeMax.value;
  let stepVal = +step.value || 1;

  let arr=[];
  for(let i=min;i<=max;i+=stepVal) arr.push(i);

  bulk.value = arr.join(",");
}

// ===== SMART =====

function dedupe(){
  let seen=new Set();
  query.query.stats.forEach(s=>{
    s.filters = s.filters.filter(f=>{
      let key=f.id+f.value.min;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  });
  refresh();
}

function compress(){
  let f=getFilters().sort((a,b)=>a.value.min-b.value.min);
  let res=[];

  for(let i=0;i<f.length;i++){
    let cur=f[i];
    while(i+1<f.length && f[i+1].value.min===cur.value.max+1){
      cur.value.max=f[i+1].value.max;
      i++;
    }
    res.push(cur);
  }
  query.query.stats[0].filters=res;
  refresh();
}

function chunk(){
  let all=[...getFilters()];
  let size=50; // safe chunk size
  query.query.stats=[];

  for(let i=0;i<all.length;i+=size){
    query.query.stats.push({
      type:"count",
      value:{min:1},
      filters:all.slice(i,i+size),
      disabled:false
    });
  }
  refresh();
}

// ===== STATS =====

function addStat(){
  query.query.stats.push({
    type:"count",
    value:{min:1},
    filters:[],
    disabled:false
  });
  refresh();
}

// ===== URL =====

function generate(){
  let raw = BASE + "?q=" + JSON.stringify(query);
  let enc = BASE + "?q=" + encodeURIComponent(JSON.stringify(query));

  rawEl.value=raw;
  encodedEl.value=enc;
}

function decodeUrl(){
  try{
    let url = importEl.value;
    let q = decodeURIComponent(url.split("?q=")[1]);
    query = JSON.parse(q);
    refresh();
  }catch(e){ alert("Invalid URL"); }
}

// ===== HELPERS =====

function parseInput(str){
  return str.split(/[\s,]+/)
    .map(n=>+n)
    .filter(n=>!isNaN(n));
}

// ===== UI =====

function refresh(){
  const div=document.getElementById("filters");
  div.innerHTML="";

  query.query.stats.forEach((s,gi)=>{
    s.filters.forEach((f,i)=>{
      let el=document.createElement("div");
      el.className="filter";
      el.innerHTML=`
        [${gi}] ${f.id}<br>
        ${f.value.min}-${f.value.max}<br>
        <button class="delete" onclick="removeFilter(${gi},${i})">Delete</button>
      `;
      div.appendChild(el);
    });
  });

  json.value = JSON.stringify(query,null,2);
}

// shortcuts
const bulk=document.getElementById("bulk");
const json=document.getElementById("json");
const rawEl=document.getElementById("raw");
const encodedEl=document.getElementById("encoded");
const importEl=document.getElementById("import");
const rangeMin=document.getElementById("rangeMin");
const rangeMax=document.getElementById("rangeMax");
const step=document.getElementById("step");

refresh();

</script>

</body>
</html>
